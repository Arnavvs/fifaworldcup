<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>WC2026 Prediction System — Progress Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{--bg:#0d1117;--card:#161b22;--border:#30363d;--txt:#e6edf3;--dim:#8b949e;
        --green:#3fb950;--amber:#d29922;--red:#f85149;--blue:#58a6ff;--purple:#bc8cff}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font:14px/1.5 'Segoe UI',system-ui,sans-serif;padding:24px;max-width:1200px;margin:auto}
  h1{font-size:22px;margin-bottom:4px} h2{font-size:15px;margin:26px 0 10px;color:var(--blue);text-transform:uppercase;letter-spacing:.08em}
  .sub{color:var(--dim);font-size:13px;margin-bottom:18px}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px}
  .card .v{font-size:24px;font-weight:700} .card .l{color:var(--dim);font-size:12px;margin-top:2px}
  .good{color:var(--green)} .warn{color:var(--amber)} .bad{color:var(--red)} .info{color:var(--blue)}
  table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
  th,td{padding:7px 11px;text-align:left;border-bottom:1px solid var(--border);font-size:13px}
  th{background:#1c2129;color:var(--dim);font-weight:600} tr:last-child td{border-bottom:none}
  .chip{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700}
  .c-done{background:#12381f;color:var(--green)} .c-prog{background:#3a2d10;color:var(--amber)}
  .c-todo{background:#21262d;color:var(--dim)} .c-block{background:#3d1418;color:var(--red)}
  .board{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px}
  .col{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px}
  .col h3{font-size:13px;color:var(--dim);margin-bottom:8px}
  .task{background:#1c2129;border:1px solid var(--border);border-radius:8px;padding:8px 10px;margin-bottom:8px}
  .task .id{font-weight:700;font-size:12px} .task .d{color:var(--dim);font-size:12px}
  .log{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;max-height:260px;overflow-y:auto;font-family:Consolas,monospace;font-size:12px}
  .log div{padding:2px 0;border-bottom:1px dashed #21262d}
  .bar-bg{background:#21262d;border-radius:6px;height:10px;overflow:hidden;margin-top:6px}
  .bar{height:100%;background:linear-gradient(90deg,var(--blue),var(--green))}
  footer{margin-top:26px;color:var(--dim);font-size:12px}
</style>
</head>
<body>
<h1>🏆 WC2026 Prediction System</h1>
<nav style="margin:2px 0 8px"><a href="index.html" style="color:var(--blue);text-decoration:none;margin-right:16px;font-size:13px">Simulations</a><a href="bracket.html" style="color:var(--blue);text-decoration:none;margin-right:16px;font-size:13px">Bracket</a><a href="entropy.html" style="color:var(--blue);text-decoration:none;margin-right:16px;font-size:13px">Entropy</a><a href="scorelines.html" style="color:var(--blue);text-decoration:none;margin-right:16px;font-size:13px">Scorelines</a><a href="players.html" style="color:var(--blue);text-decoration:none;margin-right:16px;font-size:13px">Players</a><a href="progress.html" style="color:var(--blue);text-decoration:none;font-size:13px">Tracker</a></nav>
<div class="sub" id="meta">loading…</div>

<div class="cards" id="hero"></div>

<h2>Model leaderboard (test log-loss · lower = better)</h2>
<table id="exp"><thead><tr><th>experiment</th><th>model</th><th>dataset</th><th>log-loss</th><th>Brier</th><th>acc</th><th>beats 0.8777?</th></tr></thead><tbody></tbody></table>

<h2>Task board</h2>
<div class="board" id="board"></div>

<h2>Data bank</h2>
<table id="data"><thead><tr><th>table</th><th>rows</th><th>table</th><th>rows</th></tr></thead><tbody></tbody></table>

<h2>Activity log</h2>
<div class="log" id="log"></div>

<footer id="foot"></footer>

<script src="progress_data.js"></script>
<script>
function esc(s){return String(s??'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
function render(){
  const P=window.PROGRESS||{};
  const final=new Date('2026-07-19T19:00:00Z'), now=new Date();
  const days=Math.max(0,Math.ceil((final-now)/864e5));
  document.getElementById('meta').textContent=
    `last update ${P.updated||'?'} · ${days} days to the Final (Jul 19) · run id ${P.run_id||'-'}`;

  // hero cards
  const best=P.best_logloss, bar=0.8777;
  const done=(P.tasks||[]).filter(t=>t.status==='done').length, total=(P.tasks||[]).length;
  document.getElementById('hero').innerHTML=`
    <div class="card"><div class="v ${best<bar?'good':'warn'}">${best?.toFixed(4)??'—'}</div><div class="l">best test log-loss (bar 0.8777)</div></div>
    <div class="card"><div class="v info">${P.elo_coverage??'—'}</div><div class="l">test-era ELO coverage</div></div>
    <div class="card"><div class="v">${done}/${total}</div><div class="l">tasks done</div>
      <div class="bar-bg"><div class="bar" style="width:${total?100*done/total:0}%"></div></div></div>
    <div class="card"><div class="v ${P.wc_played>0?'good':'warn'}">${P.wc_played??0}/104</div><div class="l">WC2026 matches ingested</div></div>
    <div class="card"><div class="v">${days}d</div><div class="l">until the Final</div></div>`;

  // experiments table (sorted by logloss)
  const tb=document.querySelector('#exp tbody');
  tb.innerHTML=(P.experiments||[]).map(e=>`<tr>
    <td>${esc(e.exp_id)}</td><td>${esc(e.model)}</td><td>${esc(e.features_desc)}</td>
    <td><b class="${+e.logloss_test<bar?'good':''}">${(+e.logloss_test).toFixed(4)}</b></td>
    <td>${e.brier_test?(+e.brier_test).toFixed(4):''}</td><td>${e.acc_test?(+e.acc_test).toFixed(3):''}</td>
    <td>${e.beats_baseline==='yes'?'<span class="chip c-done">YES</span>':'<span class="chip c-todo">no</span>'}</td></tr>`).join('');

  // task board grouped by sprint
  const groups={};
  (P.tasks||[]).forEach(t=>{(groups[t.sprint]=groups[t.sprint]||[]).push(t)});
  const cls={done:'c-done',in_progress:'c-prog',todo:'c-todo',blocked:'c-block'};
  document.getElementById('board').innerHTML=Object.entries(groups).map(([g,ts])=>`
    <div class="col"><h3>${esc(g)}</h3>${ts.map(t=>`
      <div class="task"><span class="id">${esc(t.id)}</span>
        <span class="chip ${cls[t.status]||'c-todo'}">${esc(t.status)}</span>
        <div class="d">${esc(t.desc)}${t.note?' — <i>'+esc(t.note)+'</i>':''}</div></div>`).join('')}</div>`).join('');

  // data bank two-column
  const d=P.db_tables||[]; let rows='';
  for(let i=0;i<d.length;i+=2){
    const a=d[i],b=d[i+1]||['',''];
    rows+=`<tr><td>${esc(a[0])}</td><td>${(+a[1]).toLocaleString()}</td><td>${esc(b[0])}</td><td>${b[1]!==''?(+b[1]).toLocaleString():''}</td></tr>`;}
  document.querySelector('#data tbody').innerHTML=rows;

  document.getElementById('log').innerHTML=(P.log||[]).slice().reverse()
    .map(l=>`<div>[${esc(l.ts)}] ${esc(l.msg)}</div>`).join('');
  document.getElementById('foot').textContent=
    `Auto-refreshes every 60s · regenerate data with:  python src/track.py update · repo: github.com/Arnavvs/fifaworldcup`;
}
render();
setInterval(()=>location.reload(),60000);
</script>
</body>
</html>
