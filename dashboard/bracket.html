<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>WC2026 — Knockout Bracket</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{--bg:#0d1117;--card:#161b22;--border:#30363d;--txt:#e6edf3;--dim:#8b949e;
        --green:#3fb950;--amber:#d29922;--red:#f85149;--blue:#58a6ff;--purple:#bc8cff;--gold:#e3b341}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font:14px/1.5 'Segoe UI',system-ui,sans-serif;padding:24px;max-width:1280px;margin:auto}
  h1{font-size:24px} h2{font-size:15px;margin:30px 0 12px;color:var(--blue);text-transform:uppercase;letter-spacing:.08em}
  .sub{color:var(--dim);font-size:13px;margin:4px 0 16px}
  nav a{color:var(--blue);text-decoration:none;margin-right:16px;font-size:13px}
  .slot-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .slot{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px}
  .slot .code{color:var(--dim);font-size:11px;margin-bottom:4px}
  .slot .team{font-weight:600;font-size:13px}
  .slot .prob{color:var(--dim);font-size:11px}
  footer{margin-top:30px;color:var(--dim);font-size:12px}
</style>
</head>
<body>
<h1>🏆 Knockout Bracket — Round of 32</h1>
<nav><a href="index.html">Simulations</a><a href="bracket.html">Bracket</a><a href="entropy.html">Entropy</a><a href="scorelines.html">Scorelines</a><a href="progress.html">Engineering tracker</a></nav>
<div class="sub" id="meta">loading…</div>

<h2>📋 R32 slots (most-likely qualifier + probability)</h2>
<div class="slot-grid" id="r32"></div>

<footer id="foot"></footer>

<script src="sim_data.js"></script>
<script>
const S = window.SIM || {};
const meta = S.meta || {};
document.getElementById('meta').textContent = `run ${meta.as_of||'?'} · ${meta.n_sims?.toLocaleString()} simulations · ${meta.locked_matches||0} locked`;

function esc(s){return String(s??'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}

// R32 slots from match_probs RoundNumber=4
const r32 = (S.match_probs || []).filter(m => m.round === 4);
const reach = S.reach_r32 || {};

// For each slot, find the most likely team
document.getElementById('r32').innerHTML = r32.map((m, i) => {
  // Try to resolve slot codes like "1A", "2B", "3C"
  // The actual slot names aren't in match_probs directly; we'll use the home/away placeholders
  const h = m.home || '?';
  const a = m.away || '?';
  // For display, show the slot code and expected teams
  const h_prob = reach[h] || 0;
  const a_prob = reach[a] || 0;
  return `<div class="slot">
    <div class="code">Match #${m.match_number} · ${esc(h)} vs ${esc(a)}</div>
    <div class="prob">P(reach): ${esc(h)} ${(h_prob*100).toFixed(1)}% · ${esc(a)} ${(a_prob*100).toFixed(1)}%</div>
    <div class="prob">Expected: ${m.exp_goals[0]}–${m.exp_goals[1]} goals</div>
  </div>`;
}).join('');

document.getElementById('foot').textContent = `All numbers from artifacts run ${meta.as_of||'?'} · regenerate: python src/m8_simulate.py`;
</script>
</body>
</html>
