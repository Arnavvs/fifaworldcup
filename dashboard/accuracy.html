<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>WC2026 Model Accuracy — Scorecard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="data/scorecard_data.js"></script>
<style>
  :root{--bg:#0d1117;--card:#161b22;--border:#30363d;--txt:#e6edf3;--dim:#8b949e;
        --green:#3fb950;--amber:#d29922;--red:#f85149;--blue:#58a6ff;--purple:#bc8cff;--gold:#e3b341}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font:14px/1.5 'Segoe UI',system-ui,sans-serif;padding:24px;max-width:1280px;margin:auto}
  h1{font-size:24px} h2{font-size:15px;margin:30px 0 12px;color:var(--blue);text-transform:uppercase;letter-spacing:.08em}
  .sub{color:var(--dim);font-size:13px;margin:4px 0 16px}
  nav a{color:var(--blue);text-decoration:none;margin-right:16px;font-size:13px}
  /* summary table */
  table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:20px}
  th,td{padding:8px 12px;border-bottom:1px solid var(--border);font-size:13px;text-align:right}
  th:first-child,td:first-child{text-align:left}
  th{background:#1c2129;color:var(--dim)} tr:last-child td{border-bottom:none}
  .good{color:var(--green)} .bad{color:var(--red)} .neutral{color:var(--dim)}
  /* per-match cards */
  .mgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:10px}
  .mcard{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
  .mcard .vs{font-weight:600;font-size:13px;display:flex;justify-content:space-between}
  .mcard .meta{color:var(--dim);font-size:11px;margin:3px 0 6px}
  .mcard .probs{display:flex;justify-content:space-between;font-size:12px;margin:4px 0}
  .mcard .probs span{padding:2px 8px;border-radius:4px}
  .mcard .correct{background:rgba(63,185,80,.15);color:var(--green)}
  .mcard .wrong{background:rgba(248,81,73,.15);color:var(--red)}
  .mcard .ll{font-size:11px;color:var(--dim);margin-top:4px}
  /* calibration chart */
  .cal-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
  .cal-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px}
  .cal-card h3{font-size:13px;color:var(--gold);margin-bottom:8px}
  .cal-bar{display:flex;align-items:center;gap:8px;margin:4px 0;font-size:12px}
  .cal-bar .label{width:50px;text-align:right;color:var(--dim)}
  .cal-bar .track{flex:1;height:18px;background:#21262d;border-radius:4px;position:relative;overflow:hidden}
  .cal-bar .pred{position:absolute;height:100%;background:var(--blue);opacity:.6;border-radius:4px}
  .cal-bar .obs{position:absolute;height:100%;background:var(--green);border-radius:4px}
  .cal-bar .vals{width:70px;text-align:right;color:var(--dim)}
  footer{margin-top:30px;color:var(--dim);font-size:12px}
</style>
</head>
<body>
<h1>Model Accuracy Scorecard</h1>
<p class="sub">Live tournament predictions vs actual WC2026 results</p>
<nav>
  <a href="index.html">Predictions</a>
  <a href="bracket.html">Bracket</a>
  <a href="entropy.html">Chaos</a>
  <a href="progress.html">Progress</a>
  <a href="accuracy.html">Accuracy</a>
</nav>

<h2>Model Comparison</h2>
<table id="summary-table">
  <thead><tr>
    <th>Model</th><th>Matches</th><th>Hit Rate</th><th>Log-Loss</th><th>vs Coinflip</th><th>Brier</th>
  </tr></thead>
  <tbody></tbody>
</table>

<h2>Per-Match Breakdown</h2>
<div class="mgrid" id="matches"></div>

<h2>Calibration</h2>
<div class="cal-grid" id="calibration"></div>

<footer>
  <span id="meta"></span>
</footer>

<script>
const data = window.SCORECARD || {};

// Summary table
const tbody = document.querySelector('#summary-table tbody');
(data.models || []).forEach(m => {
  const tr = document.createElement('tr');
  const vsClass = m.vs_coinflip > 0 ? 'good' : (m.vs_coinflip < 0 ? 'bad' : 'neutral');
  tr.innerHTML = `
    <td><b>${m.model}</b></td>
    <td>${m.n_matches}</td>
    <td class="${m.hit_rate >= 0.5 ? 'good' : 'bad'}">${(m.hit_rate*100).toFixed(0)}%</td>
    <td>${m.mean_logloss.toFixed(3)}</td>
    <td class="${vsClass}">${(m.vs_coinflip > 0 ? '+' : '')}${m.vs_coinflip.toFixed(3)}</td>
    <td>${m.mean_brier.toFixed(3)}</td>
  `;
  tbody.appendChild(tr);
});

// Per-match cards
const matchesDiv = document.getElementById('matches');
const matches = (data.matches || []).sort((a, b) => a.match_number - b.match_number);
// Group by match_number
const byMatch = {};
matches.forEach(m => {
  if (!byMatch[m.match_number]) byMatch[m.match_number] = [];
  byMatch[m.match_number].push(m);
});

Object.values(byMatch).forEach(group => {
  const m = group[0]; // use first match for basic info
  const card = document.createElement('div');
  card.className = 'mcard';
  
  let modelsHtml = '';
  group.forEach(g => {
    const cls = g.correct ? 'correct' : 'wrong';
    const txt = g.correct ? '✓' : '✗';
    modelsHtml += `
      <div class="probs">
        <span class="${cls}">${g.model} ${txt} H=${g.p_home.toFixed(3)} D=${g.p_draw.toFixed(3)} A=${g.p_away.toFixed(3)}</span>
      </div>
    `;
  });
  
  card.innerHTML = `
    <div class="vs">${m.home} ${m.score} ${m.away}</div>
    <div class="meta">${m.date} · ${m.outcome}</div>
    ${modelsHtml}
  `;
  matchesDiv.appendChild(card);
});

// Calibration charts
const calDiv = document.getElementById('calibration');
(data.models || []).forEach(m => {
  const card = document.createElement('div');
  card.className = 'cal-card';
  let barsHtml = '';
  (m.calibration || []).forEach(c => {
    const predW = c.pred ? (c.pred * 100).toFixed(0) : '0';
    const obsW = c.obs ? (c.obs * 100).toFixed(0) : '0';
    const n = c.n || 0;
    barsHtml += `
      <div class="cal-bar">
        <div class="label">${(c.lo*100).toFixed(0)}-${(c.hi*100).toFixed(0)}%</div>
        <div class="track">
          <div class="pred" style="width:${predW}%"></div>
          <div class="obs" style="width:${obsW}%"></div>
        </div>
        <div class="vals">n=${n}</div>
      </div>
    `;
  });
  card.innerHTML = `<h3>${m.model}</h3>${barsHtml}`;
  calDiv.appendChild(card);
});

// Footer
const meta = document.getElementById('meta');
meta.textContent = `Generated: ${data.generated_at || '?'} · Coinflip LL: ${data.coinflip_logloss || '?'}`;
</script>
</body>
</html>
